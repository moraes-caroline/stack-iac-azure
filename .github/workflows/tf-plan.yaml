name: Terraform Plan

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.11.0"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  # WORKING_DIRECTORY: environments/prod

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    defaults:
      run:
        shell: bash
        working-directory: environments/${{ github.event.inputs.environment || 'dev' }}

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Terraform Format Check
      run: terraform fmt -recursive

    - name: Debug
      run: |
        echo "ENVIRONMENT=${{ env.ENVIRONMENT }}"
        pwd
        ls -la

    - name: Terraform Init
      run: |
        terraform init -upgrade \
          -backend-config=backend.hcl \
          -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
          -backend-config="client_id=${{ secrets.AZURE_CLIENT_ID }}" \
          -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}"

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform State
      run: terraform state list || true
      
    # - name: Terraform Plan
    #   run: |
    #     terraform plan \
    #       -var-file="${{ github.event.inputs.environment || 'dev' }}.tfvars" \
    #       -out=tfplan \
    #       -input=false

    - name: Terraform Plan
      run: |
        terraform plan \
          -input=false \
          -lock-timeout=5m \
          -var-file="${{ github.event.inputs.environment || 'dev' }}.tfvars" \
          -out=tfplan

    - name: Generate Plan Output
      run: terraform show -no-color tfplan > tfplan.txt

    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: |
          environments/${{ github.event.inputs.environment || 'dev' }}/tfplan
          environments/${{ github.event.inputs.environment || 'dev' }}/tfplan.txt
